<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1E3C"/>
      <stop offset="100%" style="stop-color:#1E3A6E"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Blue bottom accent stripe -->
  <rect x="0" y="50" width="64" height="14" rx="0" fill="url(#stripe)" opacity="0.9"/>
  <rect x="0" y="50" width="64" height="14" rx="0" fill="url(#stripe)"/>
  <!-- Round bottom corners -->
  <rect x="0" y="50" width="64" height="6" fill="url(#bg)"/>
  <rect x="0" y="50" width="64" height="14" rx="14" fill="url(#stripe)"/>

  <!-- A letter - bold, centered -->
  <text x="32" y="46" font-family="'Arial Black', Arial" font-weight="900"
        font-size="38" fill="white" text-anchor="middle" letter-spacing="-1">A</text>

  <!-- Small dot accent top right -->
  <circle cx="54" cy="12" r="4" fill="#2563EB" opacity="0.8"/>
</svg>
